###############################################################################
# REQ-16: One-time S3 data migration — VPS Docker volume → Hetzner sajha-storage
# Trigger manually via: gh workflow run migrate-s3.yml
# Safe to re-run (aws s3 sync is idempotent).
###############################################################################

name: Migrate data to Hetzner S3

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Sync VPS data → Hetzner S3
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install AWS CLI on VPS and run sync
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.SERVER_IP }} << 'SCRIPT'
            set -e

            # Install AWS CLI via pip3 (boto3 already on server; awscli is quickest)
            if ! command -v aws &>/dev/null; then
              echo "Installing AWS CLI via pip3..."
              pip3 install awscli --quiet --break-system-packages 2>/dev/null || \
              pip3 install awscli --quiet 2>/dev/null || true
            fi

            # Fallback: use Python + boto3 for the sync if aws CLI still missing
            if ! command -v aws &>/dev/null; then
              echo "aws CLI not available — falling back to Python boto3 sync"
              python3 - << 'PYEOF'
import os, boto3, pathlib

src = pathlib.Path("/opt/sajha/data/app")
bucket = "sajha-storage"
endpoint = "https://hel1.your-objectstorage.com"

s3 = boto3.client(
    "s3",
    endpoint_url=endpoint,
    region_name="eu-central-1",
    aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
    aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
)

if not src.exists():
    print(f"Source {src} does not exist — nothing to migrate")
    exit(0)

uploaded = 0
for fpath in src.rglob("*"):
    if not fpath.is_file():
        continue
    key = str(fpath.relative_to(src))
    print(f"  upload: {key}")
    s3.upload_file(str(fpath), bucket, key)
    uploaded += 1

print(f"Uploaded {uploaded} files to s3://{bucket}")

# Verify
resp = s3.list_objects_v2(Bucket=bucket)
print(f"Objects in bucket: {resp.get('KeyCount', '?')}")
PYEOF
              exit 0
            fi

            echo "AWS CLI: $(aws --version)"

            # Export credentials
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_DEFAULT_REGION=eu-central-1

            ENDPOINT=https://hel1.your-objectstorage.com
            BUCKET=sajha-storage
            SOURCE=/opt/sajha/data/app

            echo "=== Source directory contents ==="
            du -sh $SOURCE 2>/dev/null || echo "(empty or not found)"
            find $SOURCE -type f | wc -l | xargs echo "Files to sync:"

            echo "=== Starting sync ==="
            aws s3 sync $SOURCE s3://$BUCKET \
              --endpoint-url $ENDPOINT \
              --region eu-central-1 \
              --no-progress

            echo "=== Verifying ==="
            aws s3 ls s3://$BUCKET --endpoint-url $ENDPOINT --region eu-central-1 --recursive \
              | wc -l | xargs echo "Objects in bucket:"

            echo "Migration complete."
          SCRIPT
