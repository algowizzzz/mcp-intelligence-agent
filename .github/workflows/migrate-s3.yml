name: Migrate data to Hetzner S3

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Sync VPS data to Hetzner S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy migration script to VPS
        run: scp -o StrictHostKeyChecking=no scripts/migrate_to_s3.py root@${{ secrets.SERVER_IP }}:/tmp/migrate_to_s3.py

      - name: Run migration on VPS
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.SERVER_IP }} \
            "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
             AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
             python3 /tmp/migrate_to_s3.py"
