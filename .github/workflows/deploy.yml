###############################################################################
# SAJHA MCP Agent — Build, Push & Deploy to Hetzner
#
# Triggers:
#   - Push to main branch
#   - Manual dispatch
#
# Required GitHub Secrets:
#   HETZNER_SSH_KEY        — Private SSH key for server access
#   SERVER_IP              — Hetzner server public IPv4
#   GHCR_TOKEN             — GitHub PAT with packages:write scope (or use GITHUB_TOKEN)
#   ANTHROPIC_API_KEY      — Claude API key
#   JWT_SECRET             — JWT signing secret
#   POSTGRES_PASSWORD      — PostgreSQL password
###############################################################################

name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sajha-agent

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy deployment files to server
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            scripts/init-db.sql \
            root@${{ secrets.SERVER_IP }}:/opt/sajha/

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.SERVER_IP }} << 'DEPLOY_SCRIPT'
            set -e
            cd /opt/sajha

            # Write .env from GitHub secrets
            cat > .env << 'ENV'
          GITHUB_REPO=${{ github.repository }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          POSTGRES_DB=sajha
          POSTGRES_USER=sajha
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          LLM_PROVIDER=anthropic
          ANTHROPIC_MODEL=claude-sonnet-4-20250514
          LLM_MAX_TOKENS=8192
          SAJHA_API_KEY=sja_full_access_admin
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          STORAGE_BACKEND=local
          ENV

            # Ensure data directories exist
            mkdir -p /opt/sajha/data/{postgres,app,logs}

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest and restart
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health check
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost/health > /dev/null 2>&1; then
                echo "Health check passed!"
                exit 0
              fi
              echo "  Attempt $i/30..."
              sleep 5
            done

            echo "WARNING: Health check did not pass within 150s"
            docker compose -f docker-compose.prod.yml logs --tail=50
            exit 1
          DEPLOY_SCRIPT
